<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HoverTranslate</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f8fafc;
        --card: #ffffff;
        --text: #0f172a;
        --subtext: #475569;
        --accent: #2563eb;
      }

      * {
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
        margin: 0;
        min-width: 300px;
        background: linear-gradient(180deg, #eff6ff 0%, var(--bg) 100%);
        color: var(--text);
        padding: 14px;
      }

      .card {
        background: var(--card);
        border-radius: 12px;
        padding: 14px;
        box-shadow: 0 8px 20px rgba(15, 23, 42, 0.08);
        border: 1px solid #e2e8f0;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 16px;
      }

      .subtitle {
        margin: 0 0 12px;
        color: var(--subtext);
        font-size: 12px;
      }

      label.switch {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        border: 1px solid #dbeafe;
        border-radius: 10px;
        padding: 10px;
        background: #f8fbff;
      }

      .switch-text {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .switch-text strong {
        font-size: 13px;
      }

      .switch-text span {
        font-size: 12px;
        color: var(--subtext);
      }

      input[type="checkbox"] {
        width: 18px;
        height: 18px;
        accent-color: var(--accent);
      }

      .tips {
        margin: 12px 0 0;
        padding: 0 0 0 18px;
        color: var(--subtext);
        font-size: 12px;
        line-height: 1.45;
      }

      .status {
        margin-top: 10px;
        font-size: 12px;
        color: #1d4ed8;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>HoverTranslate EN → 中文</h1>
      <p class="subtitle">支持 macOS / Windows：悬停或拖选英文即可显示中文释义。</p>

      <label class="switch">
        <span class="switch-text">
          <strong>启用实时翻译</strong>
          <span>Hover + 选中拖拽都可翻译</span>
        </span>
        <input type="checkbox" id="enabled" />
      </label>

      <ul class="tips">
        <li>拖拽选中英文文本：立即在旁边显示中文</li>
        <li>鼠标悬停英文单词：延迟 450ms 显示中文</li>
      </ul>

      <div id="status" class="status" aria-live="polite"></div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
