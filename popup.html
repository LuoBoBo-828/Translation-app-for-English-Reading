<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HoverTranslate</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 12px;
        min-width: 220px;
      }
      label {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 14px;
      }
      .hint {
        color: #666;
        margin-top: 10px;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <label>
      <input type="checkbox" id="enabled" />
      Enable hover translation
    </label>
    <div class="hint">Source: English → Target: Chinese</div>
    <script src="popup.js"></script>
  </body>
</html>
